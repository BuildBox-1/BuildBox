<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pomodoro AI Agents</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #f0efe8;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9e9e99;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.22);
    --border-info: #378ADD;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-tertiary: #242422;
      --text-primary: #f0efe8;
      --text-secondary: #a0a09a;
      --text-tertiary: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
  h1.app-title { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .app-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }

  /* Header */
  .header {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 500; flex-shrink: 0;
    background: rgba(55,138,221,0.15); color: #185FA5;
  }
  .user-info { flex: 1; }
  .user-name { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .user-streak { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .name-input-row { display: flex; gap: 8px; align-items: center; }
  .name-input-row input {
    flex: 1; padding: 7px 12px; font-size: 14px;
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    background: var(--bg-secondary); color: var(--text-primary);
    outline: none; font-family: var(--font);
  }
  .name-input-row input:focus { border-color: var(--border-info); }
  .btn-start {
    padding: 7px 16px; font-size: 13px; font-weight: 500;
    background: transparent; color: var(--text-primary);
    border: 0.5px solid var(--border-hover); border-radius: var(--radius-md);
    cursor: pointer; font-family: var(--font); white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-start:hover { background: var(--bg-secondary); }

  /* Stats */
  .global-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
  .stat-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 8px; text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

  /* Agent grid */
  .agents-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  @media (max-width: 520px) { .agents-grid { grid-template-columns: 1fr; } }

  /* Agent card */
  .agent-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s;
  }
  .agent-card.active-session { border-color: var(--border-info); }

  .agent-header { display: flex; align-items: center; gap: 10px; }
  .agent-emoji {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .agent-meta { flex: 1; }
  .agent-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .agent-role { font-size: 11px; color: var(--text-secondary); }
  .agent-status { display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-idle { background: #888780; }
  .dot-focus { background: #1D9E75; animation: pulse 1.5s infinite; }
  .dot-break { background: #378ADD; animation: pulse 2s infinite; }
  .dot-done { background: #639922; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { font-size: 11px; color: var(--text-secondary); }

  /* Timer */
  .timer-display { text-align: center; padding: 4px 0; }
  .timer-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .timer-text { position: absolute; text-align: center; }
  .timer-big { font-size: 22px; font-weight: 500; color: var(--text-primary); display: block; }
  .timer-label { font-size: 10px; color: var(--text-secondary); display: block; margin-top: 1px; }

  /* Chat bubble */
  .chat-bubble {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    font-size: 12px; color: var(--text-secondary);
    line-height: 1.55; min-height: 38px;
  }

  /* Controls */
  .agent-controls { display: flex; gap: 6px; }
  .ctrl-btn {
    flex: 1; padding: 6px 0; font-size: 12px;
    background: transparent; border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md); cursor: pointer; color: var(--text-primary);
    font-family: var(--font); transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .ctrl-btn:hover { background: var(--bg-secondary); }

  /* Suggestion pills */
  .suggestion-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill {
    font-size: 11px; padding: 3px 10px;
    border-radius: 20px; cursor: pointer;
    border: 0.5px solid var(--border-hover);
    color: var(--text-secondary); background: transparent;
    font-family: var(--font); transition: background 0.15s;
  }
  .pill:hover { background: var(--bg-secondary); }

  /* Session log */
  .session-log {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 8px 10px;
  }
  .session-log-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  .log-entry { font-size: 11px; color: var(--text-secondary); padding: 2px 0; display: flex; gap: 8px; }
  .log-time { color: var(--text-tertiary); flex-shrink: 0; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text-primary); color: var(--bg-primary);
    padding: 10px 20px; border-radius: var(--radius-md);
    font-size: 13px; z-index: 999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Notification permission banner */
  .notif-banner {
    background: rgba(55,138,221,0.1);
    border: 0.5px solid rgba(55,138,221,0.3);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .notif-banner button {
    font-size: 11px; padding: 4px 10px;
    background: transparent; border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md); cursor: pointer; color: var(--text-primary);
    font-family: var(--font);
  }
</style>
</head>
<body>
<div class="container">
  <div>
    <h1 class="app-title">Pomodoro AI Agents</h1>
    <p class="app-subtitle">4 focus agents · context memory · smart suggestions</p>
  </div>

  <div id="notif-banner" class="notif-banner" style="display:none">
    <span><i class="ti ti-bell" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>Enable notifications to get alerted when a session ends</span>
    <button onclick="requestNotif()">Allow</button>
  </div>

  <div class="header" id="header-area">
    <div id="user-avatar" class="avatar">?</div>
    <div class="user-info">
      <div class="user-name" id="display-name">Who are you?</div>
      <div class="user-streak" id="display-streak">Enter your name to get started</div>
    </div>
    <div class="name-input-row" id="name-row">
      <input type="text" id="name-input" placeholder="Your name..." maxlength="20"/>
      <button class="btn-start" onclick="setUser()">Start ↗</button>
    </div>
  </div>

  <div class="global-stats">
    <div class="stat-card"><div class="stat-num" id="stat-sessions">0</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-focus">0m</div><div class="stat-label">Focus time</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Day streak</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-breaks">0</div><div class="stat-label">Breaks taken</div></div>
  </div>

  <div class="agents-grid" id="agents-grid"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const AGENTS = [
  {
    id:'deep', name:'Focus', emoji:'🎯', role:'Deep work specialist',
    color:'background:rgba(83,74,183,0.15);color:#534AB7',
    workMin:25, breakMin:5,
    suggestions:['Block distractions','Set clear goal','No multitasking'],
    greets:['Time to lock in,','Deep work mode,','Let\'s get focused,'],
    focusMsgs:['Stay in the zone.','Distraction = lost momentum.','You\'re building something real.','Block everything else.','No context switching.'],
    breakMsgs:['Rest your eyes.','Take a breath.','Stand up, stretch.','Good work so far.'],
    doneMsgs:['Pomodoro complete.','Solid session.','That\'s another one done.','You earned this break.'],
  },
  {
    id:'flow', name:'Flow', emoji:'🌊', role:'Creative flow coach',
    color:'background:rgba(29,158,117,0.15);color:#0F6E56',
    workMin:45, breakMin:10,
    suggestions:['Find your rhythm','Start small','Trust the process'],
    greets:['Welcome back,','Good to see you,','Ready to flow,'],
    focusMsgs:['Let ideas come naturally.','Don\'t force it — ride it.','You\'re in the zone now.','Keep the momentum going.','Creativity is a slow burn.'],
    breakMsgs:['Let your mind wander.','Creativity needs rest too.','Recharge before the next wave.','Ideas often come during breaks.'],
    doneMsgs:['Beautiful session.','You flowed well today.','That\'s 45 minutes of real work.','Another flow complete.'],
  },
  {
    id:'sprint', name:'Sprint', emoji:'⚡', role:'Fast-burst productivity',
    color:'background:rgba(216,90,48,0.15);color:#993C1D',
    workMin:15, breakMin:3,
    suggestions:['Pick ONE task','Go all out','Short bursts work'],
    greets:['Let\'s GO,','Ready to sprint,','Quick and focused,'],
    focusMsgs:['15 mins. Full speed.','No stopping now.','Burn through it!','Almost there — push!','Eyes on the clock.'],
    breakMsgs:['Quick breath.','Shake it out.','3 mins, then back at it.','Reloading...'],
    doneMsgs:['Sprint complete! 💥','Nailed it.','That\'s how you do it.','Ready for the next one?'],
  },
  {
    id:'zen', name:'Zen', emoji:'🧘', role:'Mindful work guide',
    color:'background:rgba(55,138,221,0.15);color:#185FA5',
    workMin:20, breakMin:7,
    suggestions:['Be present','One breath at a time','Pace yourself'],
    greets:['Welcome,','Be here now,','Good to see you,'],
    focusMsgs:['Breathe. Focus. Work.','Steady and calm.','Quality over speed.','Be fully present.','One thing at a time.'],
    breakMsgs:['Breathe deeply.','Let go of the last session.','Rest is productive too.','Return refreshed.'],
    doneMsgs:['Well done, truly.','A mindful session complete.','You worked with intention.','Balance is everything.'],
  }
];

function loadState() {
  try { return JSON.parse(localStorage.getItem('pomo_state')||'{}'); } catch(e) { return {}; }
}
function saveState() { localStorage.setItem('pomo_state', JSON.stringify(persist)); }

const today = new Date().toDateString();
const yesterday = new Date(Date.now()-86400000).toDateString();
const saved = loadState();
let streak = saved.streak||0;
let lastDate = saved.lastDate||'';

const persist = {
  userName: saved.userName||'',
  sessions: saved.sessions||0,
  focusMinutes: saved.focusMinutes||0,
  breaks: saved.breaks||0,
  streak,
  lastDate,
  agentLogs: saved.agentLogs||{}
};

const runtime = {};
AGENTS.forEach(a => {
  runtime[a.id] = { status:'idle', elapsed:0, interval:null, phase:'work', sessionCount:0 };
});

function getInitials(n){ return n.slice(0,2).toUpperCase(); }
function fmtTime(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function nowTime(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function notify(title, body){
  if(Notification.permission==='granted'){
    new Notification(title, {body, icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">🍅</text></svg>'});
  }
}

function requestNotif(){
  Notification.requestPermission().then(p=>{
    if(p==='granted') showToast('Notifications enabled!');
    document.getElementById('notif-banner').style.display='none';
  });
}

function checkStreak(){
  if(persist.lastDate !== today){
    if(persist.lastDate === yesterday) persist.streak++;
    else persist.streak = 1;
    persist.lastDate = today;
    saveState();
  }
}

function setUser(){
  const val = document.getElementById('name-input').value.trim();
  if(!val) return;
  persist.userName = val;
  checkStreak();
  saveState();
  applyUser();
}

function applyUser(){
  const n = persist.userName;
  if(!n) return;
  const av = document.getElementById('user-avatar');
  av.textContent = getInitials(n);
  document.getElementById('display-name').textContent = n;
  document.getElementById('display-streak').textContent = `Day streak: ${persist.streak} 🔥 · ${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
  document.getElementById('name-row').innerHTML = `<span style="font-size:12px;color:var(--text-secondary)">Hi ${n}! Choose an agent below.</span>`;
  if(Notification.permission==='default') document.getElementById('notif-banner').style.display='flex';
  renderAgents();
  updateStats();
}

function updateStats(){
  document.getElementById('stat-sessions').textContent = persist.sessions;
  document.getElementById('stat-focus').textContent = persist.focusMinutes+'m';
  document.getElementById('stat-streak').textContent = persist.streak;
  document.getElementById('stat-breaks').textContent = persist.breaks;
}

function getBubble(a, status){
  if(!persist.userName) return 'Enter your name above to activate me.';
  const n = persist.userName;
  if(status==='idle') return `${rand(a.greets)} ${n}! ${a.workMin}-min focus sessions. ${a.role}.`;
  if(status==='focus') return rand(a.focusMsgs);
  if(status==='break') return rand(a.breakMsgs);
  if(status==='done') return rand(a.doneMsgs);
  return '';
}

function renderAgents(){
  const grid = document.getElementById('agents-grid');
  grid.innerHTML = '';
  AGENTS.forEach(a => {
    const rt = runtime[a.id];
    const logs = (persist.agentLogs[a.id]||[]);
    const totalSecs = (rt.phase==='work'?a.workMin:a.breakMin)*60;
    const remaining = Math.max(0, totalSecs - rt.elapsed);
    const pct = rt.elapsed/totalSecs;
    const R=38, circ=2*Math.PI*R;
    const dash = circ*(1-Math.min(pct,1));
    const colorMap={idle:'#888780',focus:'#1D9E75',break:'#378ADD',done:'#639922'};
    const rc = colorMap[rt.status]||'#888780';
    const isActive = rt.status==='focus'||rt.status==='break';
    const bubble = getBubble(a, rt.status);
    const dotClass = rt.status==='focus'?'dot-focus':rt.status==='break'?'dot-break':rt.status==='done'?'dot-done':'dot-idle';
    const statusLabel = rt.status==='focus'?'Focusing':rt.status==='break'?'On break':rt.status==='done'?'Done':'Ready';

    const card = document.createElement('div');
    card.className = 'agent-card'+(isActive?' active-session':'');
    card.id = 'card-'+a.id;

    let controls = '';
    if(rt.status==='idle'||rt.status==='done') controls += `<button class="ctrl-btn" onclick="startAgent('${a.id}')"><i class="ti ti-player-play"></i> Start</button>`;
    if(isActive) controls += `<button class="ctrl-btn" onclick="pauseAgent('${a.id}')"><i class="ti ti-player-pause"></i> Pause</button>`;
    if(rt.status!=='idle') controls += `<button class="ctrl-btn" onclick="resetAgent('${a.id}')"><i class="ti ti-refresh"></i> Reset</button>`;

    const pills = rt.sessionCount>0 ? `<div class="suggestion-pills">${a.suggestions.map(s=>`<span class="pill" title="Smart tip from ${a.name}">${s}</span>`).join('')}</div>` : '';

    const logHtml = logs.length>0 ? `<div class="session-log">
      <div class="session-log-title"><i class="ti ti-history" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>Recent</div>
      ${logs.slice(-3).map(l=>`<div class="log-entry"><span class="log-time">${l.time}</span><span>${l.text}</span></div>`).join('')}
    </div>` : '';

    card.innerHTML = `
      <div class="agent-header">
        <div class="agent-emoji" style="${a.color}">${a.emoji}</div>
        <div class="agent-meta">
          <div class="agent-name">${a.name}</div>
          <div class="agent-role">${a.role}</div>
        </div>
        <div class="agent-status">
          <div class="status-dot ${dotClass}"></div>
          <span class="status-text">${statusLabel}</span>
        </div>
      </div>
      <div class="timer-display">
        <div class="timer-ring">
          <svg width="90" height="90" viewBox="0 0 90 90" aria-hidden="true">
            <circle cx="45" cy="45" r="${R}" fill="none" stroke="var(--border)" stroke-width="5"/>
            <circle id="ring-${a.id}" cx="45" cy="45" r="${R}" fill="none" stroke="${rc}" stroke-width="5"
              stroke-dasharray="${circ}" stroke-dashoffset="${dash}"
              stroke-linecap="round" transform="rotate(-90 45 45)"/>
          </svg>
          <div class="timer-text">
            <span class="timer-big" id="tbig-${a.id}">${fmtTime(remaining)}</span>
            <span class="timer-label" id="tlabel-${a.id}">${rt.phase==='work'?'focus':'break'}</span>
          </div>
        </div>
      </div>
      <div class="chat-bubble" id="bubble-${a.id}">${bubble}</div>
      <div class="agent-controls">${controls}</div>
      ${pills}
      ${logHtml}
    `;
    grid.appendChild(card);
  });
}

function startAgent(id){
  if(!persist.userName){ showToast('Enter your name first!'); return; }
  const rt = runtime[id];
  if(rt.interval) return;
  rt.status = rt.phase==='work'?'focus':'break';
  rt.interval = setInterval(()=>tickAgent(id),1000);
  renderAgents();
}

function pauseAgent(id){
  const rt = runtime[id];
  clearInterval(rt.interval); rt.interval=null;
  rt.status='idle';
  renderAgents();
}

function resetAgent(id){
  const rt = runtime[id];
  clearInterval(rt.interval); rt.interval=null;
  rt.status='idle'; rt.elapsed=0; rt.phase='work';
  renderAgents();
}

function tickAgent(id){
  const a = AGENTS.find(x=>x.id===id);
  const rt = runtime[id];
  const totalSecs = (rt.phase==='work'?a.workMin:a.breakMin)*60;
  rt.elapsed = Math.min(rt.elapsed+1, totalSecs);

  if(rt.elapsed >= totalSecs){
    clearInterval(rt.interval); rt.interval=null;
    if(rt.phase==='work'){
      rt.sessionCount++;
      persist.sessions++;
      persist.focusMinutes += a.workMin;
      if(!persist.agentLogs[id]) persist.agentLogs[id]=[];
      persist.agentLogs[id].push({time:nowTime(), text:`${a.workMin}m focus complete`});
      notify(`${a.emoji} ${a.name} — Focus done!`, `${a.workMin} minutes done, ${persist.userName}. Time for a break.`);
      rt.phase='break'; rt.elapsed=0; rt.status='break';
      rt.interval=setInterval(()=>tickAgent(id),1000);
    } else {
      persist.breaks++;
      if(!persist.agentLogs[id]) persist.agentLogs[id]=[];
      persist.agentLogs[id].push({time:nowTime(), text:`Break done · session #${rt.sessionCount}`});
      notify(`${a.emoji} ${a.name} — Break over!`, `Ready for another session, ${persist.userName}?`);
      rt.phase='work'; rt.elapsed=0; rt.status='done';
    }
    saveState();
    updateStats();
    renderAgents();
    return;
  }

  const remSecs = totalSecs - rt.elapsed;
  const R=38, circ=2*Math.PI*R;
  const pct = rt.elapsed/totalSecs;
  const dash = circ*(1-pct);
  const colorMap={focus:'#1D9E75',break:'#378ADD'};
  const rc = colorMap[rt.status]||'#1D9E75';

  const tbig = document.getElementById('tbig-'+id);
  const ring = document.getElementById('ring-'+id);
  const bubble = document.getElementById('bubble-'+id);
  if(tbig) tbig.textContent = fmtTime(remSecs);
  if(ring){ ring.setAttribute('stroke-dashoffset', dash); ring.setAttribute('stroke', rc); }
  if(bubble && rt.elapsed % 20 === 0){
    bubble.textContent = rt.status==='focus'?rand(a.focusMsgs):rand(a.breakMsgs);
  }
}

document.getElementById('name-input').addEventListener('keydown', e=>{ if(e.key==='Enter') setUser(); });

if(persist.userName) applyUser();
else renderAgents();
updateStats();
</script>
</body>
</html>
